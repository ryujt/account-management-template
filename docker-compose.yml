services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      JWT_SECRET: docker-dev-secret-change-me
      JWT_EXPIRES_IN: 900
      SESSION_TTL_DAYS: 14
      DB_PATH: /data/app.db
      FRONTEND_URL: http://localhost:5173
    volumes:
      - db-data:/data
    restart: unless-stopped

  backend-admin:
    build:
      context: .
      dockerfile: docker/backend-admin.Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: docker-dev-secret-change-me
      JWT_EXPIRES_IN: 900
      SESSION_TTL_DAYS: 14
      DB_PATH: /data/app.db
      ADMIN_FRONTEND_URL: http://localhost:5174
    volumes:
      - db-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    ports:
      - "5174:80"
    depends_on:
      - backend-admin
    restart: unless-stopped

volumes:
  db-data:
